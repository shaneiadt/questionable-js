nodeLinker: node-modules

packageExtensions:
  "@typescript-eslint/experimental-utils@*":
    peerDependencies:
      typescript: "*"
  "@typescript-eslint/utils@*":
    peerDependencies:
      typescript: "*"
  "eslint-plugin-testing-library@*":
    peerDependencies:
      typescript: "*"
  "eslint-config-react-app@*":
    peerDependencies:
      "@babel/plugin-syntax-flow": "*"
      "@babel/plugin-transform-react-jsx": "*"
  "eslint-plugin-jest@*":
    peerDependencies:
      typescript: "*"
  "react-scripts@*":
    peerDependencies:
      "@babel/plugin-syntax-flow": "*"
      "@babel/plugin-transform-react-jsx": "*"
